name: Release

# Push a tag like v1.2.3 to build the .ipk and publish it as a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Sync version into manifests
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          npm pkg set version="$VERSION"
          node -e "const f='public/appinfo.json';const j=require('./'+f);j.version=process.env.VERSION;require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n')"

      - name: Build and package
        run: npm run package

      - name: Rename .ipk to stable name
        run: |
          mkdir -p release
          cp out/*.ipk release/com.immich.webos.ipk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/com.immich.webos.ipk
          generate_release_notes: true
